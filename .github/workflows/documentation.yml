name: Documentation

on:
  push:
    branches:
      - main # update to match your development branch (master, main, dev, trunk, ...)
    tags: '*'
  pull_request:

jobs:
  build:
    permissions:https://github.com/stefanocovino/AtmosphericExtinction.jl/pull/4/conflict?name=.github%252Fworkflows%252Fdocumentation.yml&ancestor_oid=855e1bf49a7bfe6c66a5b22db28719e382d29665&base_oid=d53c013cdabeb73a32ce082a4cceb33e1d76412f&head_oid=d759c1364ae60e58340f08bc2f494e4c1059d92a
      contents: write
      statuses: write
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: julia-actions/setup-julia@v2
        with:
          version: '1.12'
      - name: Install dependencies
        run: julia --project=docs/ -e 'using Pkg; Pkg.develop(PackageSpec(path=pwd())); Pkg.instantiate()'
      - name: Build and deploy
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }} # If authenticating with GitHub Actions token
          DOCUMENTER_KEY: ${{ secrets.DOCUMENTER_KEY }} # If authenticating with SSH deploy key
        run: julia --project=docs/ docs/make.jl